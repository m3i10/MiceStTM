[micesttm]
wakeword = computer
speech_model_path = /opt/micesttm/model
macro_path = $HOME/.config/micesttm/macros/de
upper_word_list_file = upper_word_list_de
main_macro_file = macro
number_replace_file = number_replace
speech_replace_file = speech_replace
tts_player = xterm -e /opt/micesttm/share/play.py
mutespeaker = pactl -- set-sink-mute 0 1
unmutespeaker = pactl -- set-sink-mute 0 0
signal = /opt/micesttm/speechrecognition/ping.wav

[say]
pipermodeldir = /opt/micesttm/voice/de_DE-thorsten-high.onnx
max_tts_filename = 120

[scanner]
outputdir = /MiceStTM/letter
outputtext = text.txt
original = letter_original.png
original_rotate = letter_rotated.png
rotate_invert = letter_invert_and_rotated.png
say_scan_letter = Der Brief wird gescannt. Das dauert etwas! Das Dokument wird unter Mice STTM lätter Datei Name: lätter original. Punkt. P. N. Gehhh.!! gespeichert. Und unter lätter roäited. Punkt. P. N. G.!!!., und lätter_invört_and_rotaited. Der Sprach Befehl, scän anzeigen oder Brief Verzeichnis anzeigen, zeigen das Verzeichnis an, indem der Brief steht
say_error_no_scanner_found = Achtung Fehler! keinen Scanner gefunden
say_path_not_found = Achtung Fehler! Bearbeitungsverzeichnis nicht gefunden, bearbeiten sie die meiß punkt ini
say_please_wait = Bitte warten!

[language]
scanner_language = de
tesseract_language = deu

[micautogain]
max_micpegel = 65536
max_amplitude = 15000

[file_read__watcher]
path_to_watch = $HOME/MiceStTM/read_aloud

[tts]
speed = 1.60
volume = 1.20
pitch = 0.00

